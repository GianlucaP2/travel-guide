apiVersion: v1
kind: Secret
metadata:
  name: travel-guide-secrets
  namespace: travel-guide
type: Opaque
stringData:
  PORT: "3001"
  CORS_ORIGINS: '["http://localhost:5173","http://localhost:3000","https://travel-guide.pages.dev"]'
  CORS_ORIGIN_REGEX: '(http://localhost(:\d+)?)|(https://[\w-]+\.trycloudflare\.com)|(https://[\w-]+\.pages\.dev)'
  # OPENAI_API_KEY is injected via GitHub secret OPENAI_API_KEY.
  # To set/rotate manually:
  #   kubectl patch secret travel-guide-secrets -n travel-guide \
  #     --type=merge -p '{"stringData":{"OPENAI_API_KEY":"sk-..."}}'
  # Then: kubectl rollout restart deployment/api -n travel-guide
  OPENAI_API_KEY: "REPLACE_WITH_REAL_KEY_DO_NOT_COMMIT"
